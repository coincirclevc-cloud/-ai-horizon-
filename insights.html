<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>行业洞察 — AI Horizon Matrix</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060612;--bg2:#0d0d1f;--bg3:#12122a;
  --accent:#6366f1;--accent2:#8b5cf6;--accent3:#06b6d4;
  --gold:#f59e0b;--green:#10b981;--red:#ef4444;
  --text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
  --border:rgba(99,102,241,0.2);--card:rgba(13,13,31,0.8);
  --g1:linear-gradient(135deg,#6366f1,#8b5cf6);
  --g2:linear-gradient(135deg,#06b6d4,#6366f1);
  --g3:linear-gradient(135deg,#f59e0b,#ef4444);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}

/* NAV */
nav{position:fixed;top:0;width:100%;z-index:999;background:rgba(6,6,18,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 40px;height:60px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-logo-box{width:32px;height:32px;background:var(--g1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.nav-brand span{font-size:15px;font-weight:700;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-menu{display:flex;gap:28px;list-style:none}
.nav-menu a{color:var(--muted2);text-decoration:none;font-size:13px;transition:color .2s}
.nav-menu a:hover{color:#a5b4fc}
.nav-menu a.active{color:#a5b4fc;border-bottom:2px solid #6366f1;padding-bottom:2px}
.nav-cta{background:var(--g1);border:none;color:#fff;padding:7px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s}
.nav-cta:hover{opacity:.85}

/* PAGE HEADER */
.page-header{padding:100px 24px 48px;max-width:1200px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap}
.page-header-left{}
.page-header-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#6366f1;margin-bottom:10px;font-weight:600}
.page-header-title{font-size:clamp(1.8rem,3vw,2.6rem);font-weight:800;color:#e0e7ff;margin-bottom:10px}
.page-header-desc{color:var(--muted2);max-width:540px;font-size:.95rem;line-height:1.7}
.page-header-stats{display:flex;gap:28px;flex-shrink:0}
.ph-stat{text-align:right}
.ph-stat .num{font-size:1.6rem;font-weight:800;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ph-stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}

/* SECTION */
.section{max-width:1200px;margin:0 auto;padding:0 24px 80px}

/* CONTROLS */
.insights-controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.ins-region-tabs{display:flex;gap:6px}
.ins-rtab{padding:6px 16px;border-radius:20px;font-size:13px;border:1px solid var(--border);cursor:pointer;color:var(--muted2);background:transparent;transition:all .2s}
.ins-rtab:hover,.ins-rtab.active{background:rgba(99,102,241,.2);border-color:#6366f1;color:#a5b4fc}
.ins-topic-tags{display:flex;flex-wrap:wrap;gap:6px;flex:1}
.ins-ttag{padding:5px 12px;border-radius:14px;font-size:12px;border:1px solid var(--border);cursor:pointer;color:var(--muted2);background:transparent;transition:all .2s}
.ins-ttag:hover{border-color:rgba(99,102,241,.5);color:#c4b5fd}
.ins-ttag.active{background:rgba(99,102,241,.18);border-color:#6366f1;color:#a5b4fc}
.ins-sort{padding:5px 12px;border-radius:14px;font-size:12px;border:1px solid var(--border);background:transparent;color:var(--muted2);cursor:pointer;outline:none;appearance:none;-webkit-appearance:none}
.ins-sort option{background:#0d0d1f;color:#e2e8f0}

/* LAYOUT */
.insights-layout{display:grid;grid-template-columns:1fr 260px;gap:32px;align-items:start}
@media(max-width:1023px){.insights-layout{grid-template-columns:1fr}}

/* ARTICLE CARDS */
.articles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
@media(min-width:720px){.art-card-featured{grid-column:span 2}}
.art-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:border-color .25s,transform .25s,box-shadow .25s;display:flex;flex-direction:column}
.art-card:hover{border-color:rgba(99,102,241,.6);transform:translateY(-3px);box-shadow:0 8px 32px rgba(99,102,241,.15)}
.art-cover{height:120px;position:relative;overflow:hidden;flex-shrink:0}
.art-card-featured .art-cover{height:180px}
.art-cover-bg{width:100%;height:100%;transition:transform .4s}
.art-card:hover .art-cover-bg{transform:scale(1.04)}
.art-cover-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(6,6,18,.85))}
.art-region-badge{position:absolute;top:10px;right:10px;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:600}
.art-region-overseas{background:rgba(6,182,212,.2);border:1px solid rgba(6,182,212,.5);color:#22d3ee}
.art-region-domestic{background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.5);color:#34d399}
.art-featured-badge{position:absolute;top:10px;left:10px;background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:700}
.art-body{padding:16px;flex:1;display:flex;flex-direction:column}
.art-topic-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:8px;margin-bottom:8px;font-weight:600}
.art-title{font-size:.92rem;font-weight:700;color:#e0e7ff;line-height:1.45;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.art-card-featured .art-title{font-size:1rem;-webkit-line-clamp:2}
.art-summary{font-size:.8rem;color:var(--muted2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.art-card-featured .art-summary{-webkit-line-clamp:3}
.art-meta{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.art-source{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.art-source-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}
.art-stats{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--muted)}
.art-stat-item{display:flex;align-items:center;gap:3px}
.art-save-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px;transition:color .2s;line-height:1}
.art-save-btn:hover,.art-save-btn.saved{color:#f59e0b}
.ins-load-more{text-align:center;margin-top:28px}
.ins-load-btn{background:transparent;border:1px solid var(--border);color:var(--muted2);padding:10px 28px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .2s}
.ins-load-btn:hover{border-color:#6366f1;color:#a5b4fc}

/* HOTLIST */
.ins-hotlist{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;position:sticky;top:80px}
.ins-hotlist-title{font-size:.78rem;font-weight:700;color:#e0e7ff;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.ins-hotlist-item{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .2s}
.ins-hotlist-item:last-child{border-bottom:none}
.ins-hotlist-item:hover{opacity:.75}
.ins-hotlist-num{font-size:.85rem;font-weight:800;min-width:20px;color:var(--muted);line-height:1.4}
.ins-hotlist-num-top{color:#f59e0b}
.ins-hotlist-text{font-size:.78rem;color:var(--muted2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.ins-hotlist-reads{font-size:10px;color:var(--muted);white-space:nowrap}

/* EMPTY STATE */
.ins-empty{text-align:center;padding:60px 24px;color:var(--muted)}
.ins-empty-icon{font-size:2.5rem;margin-bottom:12px}
.ins-empty p{font-size:.9rem;line-height:1.6}

/* FOOTER */
footer{text-align:center;padding:50px 24px 40px;border-top:1px solid var(--border);color:var(--muted);font-size:12px}
footer .logo-text{font-size:1.2rem;font-weight:800;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}

@media(max-width:640px){
  nav{padding:0 16px}
  .nav-menu{display:none}
  .page-header{padding:80px 16px 32px;flex-direction:column;align-items:flex-start}
  .page-header-stats{display:none}
  .section{padding:0 16px 60px}
}

/* ARTICLE READING DRAWER */
.art-drawer{background:var(--card);border:1px solid var(--border);border-radius:16px;position:sticky;top:80px;overflow:hidden;max-height:calc(100vh - 100px);display:flex;flex-direction:column;transition:all .25s}
.art-drawer-topbar{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.art-drawer-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:600}
.art-drawer-close{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;flex-shrink:0;line-height:1}
.art-drawer-close:hover{border-color:var(--accent);color:#a5b4fc}
.art-drawer-scroll{flex:1;overflow-y:auto}
.art-drawer-scroll::-webkit-scrollbar{width:3px}
.art-drawer-scroll::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
.art-drawer-cover{height:90px;width:100%;flex-shrink:0}
.art-drawer-meta{padding:14px 16px 12px}
.art-drawer-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.art-drawer-badge{padding:2px 8px;border-radius:9px;font-size:11px;font-weight:600}
.art-drawer-title{font-size:.95rem;font-weight:800;color:#e0e7ff;line-height:1.4;margin-bottom:8px}
.art-drawer-byline{font-size:11px;color:var(--muted);line-height:1.7}
.art-drawer-hr{height:1px;background:var(--border);margin:0 16px}
.art-drawer-section{padding:14px 16px}
.art-drawer-slabel{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:12px}
.art-drawer-kp{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:4px}
.art-drawer-kp li{display:flex;gap:10px;align-items:flex-start}
.art-drawer-kp-n{width:20px;height:20px;border-radius:50%;background:rgba(99,102,241,.18);border:1px solid rgba(99,102,241,.4);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#a5b4fc;flex-shrink:0;margin-top:1px}
.art-drawer-kp-t{font-size:.82rem;color:#e0e7ff;line-height:1.65}
.art-drawer-summary{font-size:.82rem;color:var(--muted2);line-height:1.85}
.art-drawer-foot{padding:14px 16px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:8px}
.art-drawer-cta{flex:1;display:block;padding:9px;border-radius:10px;background:var(--g1);color:#fff;font-size:.82rem;font-weight:700;text-align:center;text-decoration:none;border:none;cursor:pointer;transition:opacity .2s}
.art-drawer-cta:hover{opacity:.85}
.art-drawer-cta-sec{display:block;padding:9px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted2);font-size:.82rem;cursor:pointer;transition:all .2s;white-space:nowrap;text-decoration:none}
.art-drawer-cta-sec:hover{border-color:var(--accent);color:#a5b4fc}
.art-card.art-active{border-color:#6366f1!important;box-shadow:0 0 0 2px rgba(99,102,241,.25)!important}

/* right panel switch */
#insRightPanel{position:relative}
#insHotlistWrap,#insDrawerWrap{transition:opacity .2s}
</style>
</head>

let insightRegion = 'all';
let insightTopics = [];
let insightSort = 'latest';
let insightPage = 1;
const PAGE_SIZE = 9;
let savedArticles = JSON.parse(localStorage.getItem('ahm_saved_arts')||'[]');

function getTopicStyle(t){ return TOPIC_META[t]||{label:t,color:'rgba(99,102,241,.18)',border:'rgba(99,102,241,.5)',text:'#a5b4fc'}; }

function filterArticles(){
  return ARTICLES
    .filter(a => insightRegion==='all' || a.region===insightRegion)
    .filter(a => insightTopics.length===0 || insightTopics.some(t=>a.topics.includes(t)))
    .sort((a,b)=>{
      if(insightSort==='popular') return b.likes-a.likes;
      if(insightSort==='featured') return (b.isFeatured?1:0)-(a.isFeatured?1:0);
      return new Date(b.publishDate)-new Date(a.publishDate);
    });
}

function buildArticleCard(art, idx){
  const tm = getTopicStyle(art.topics[0]);
  const regionLabel = art.region==='overseas'?'🌍 海外':'🇨🇳 海内';
  const regionClass = art.region==='overseas'?'art-region-overseas':'art-region-domestic';
  const isFeatured = art.isFeatured && idx < 4;
  const isSaved = savedArticles.includes(art.id);
  const dateStr = art.publishDate.slice(5).replace('-','月')+'日';
  return `<div class="art-card${isFeatured?' art-card-featured':''}" onclick="openArticleDrawer('${art.id}')">
    <div class="art-cover">
      <div class="art-cover-bg" style="background:${art.coverGradient}"></div>
      <div class="art-cover-overlay"></div>
      <span class="art-region-badge ${regionClass}">${regionLabel}</span>
      ${isFeatured?'<span class="art-featured-badge">✨ 精选</span>':''}
    </div>
    <div class="art-body">
      <span class="art-topic-tag" style="background:${tm.color};border:1px solid ${tm.border};color:${tm.text}">${tm.label}</span>
      <div class="art-title">${art.title}</div>
      <div class="art-summary">${art.summary}</div>
      <div class="art-meta">
        <div class="art-source">
          <span class="art-source-dot"></span>
          <span>${art.source}${art.author?' · '+art.author:''}</span>
          <span style="margin-left:4px;color:var(--muted)">· ${dateStr}</span>
        </div>
        <div class="art-stats">
          <span class="art-stat-item">⏱ ${art.readTime}min</span>
          <span class="art-stat-item">❤ ${art.likes}</span>
          <button class="art-save-btn${isSaved?' saved':''}" title="收藏" onclick="event.stopPropagation();toggleSaveArticle('${art.id}',this)">🔖</button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderInsights(){
  const filtered = filterArticles();
  const page = filtered.slice(0, insightPage * PAGE_SIZE);
  const grid = document.getElementById('articlesGrid');
  if(!grid) return;
  if(page.length===0){
    grid.innerHTML=`<div class="ins-empty" style="grid-column:1/-1"><div class="ins-empty-icon">🔍</div><p>暂无符合条件的文章<br>试试调整筛选条件</p></div>`;
    document.getElementById('insLoadMore').style.display='none';
    return;
  }
  grid.innerHTML = page.map((a,i)=>buildArticleCard(a,i)).join('');
  document.getElementById('insLoadMore').style.display = filtered.length > page.length ? '' : 'none';
}

function renderHotList(){
  const top10 = [...ARTICLES].sort((a,b)=>b.likes-a.likes).slice(0,10);
  const el = document.getElementById('insHotlistItems');
  if(!el) return;
  el.innerHTML = top10.map((a,i)=>`
    <div class="ins-hotlist-item" onclick="openArticleDrawer('${a.id}')">
      <span class="ins-hotlist-num${i<3?' ins-hotlist-num-top':''}">${i+1}</span>
      <span class="ins-hotlist-text">${a.title}</span>
      <span class="ins-hotlist-reads">${a.likes}</span>
    </div>`).join('');
}

window.filterInsightRegion = function(region, btn){
  insightRegion = region; insightPage = 1;
  document.querySelectorAll('.ins-rtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderInsights();
};
window.toggleInsightTopic = function(topic, btn){
  const idx = insightTopics.indexOf(topic);
  if(idx===-1){ insightTopics.push(topic); btn.classList.add('active'); }
  else { insightTopics.splice(idx,1); btn.classList.remove('active'); }
  insightPage = 1; renderInsights();
};
window.sortInsights = function(sort){ insightSort=sort; insightPage=1; renderInsights(); };
window.loadMoreArticles = function(){ insightPage++; renderInsights(); };
window.toggleSaveArticle = function(id, btn){
  const idx = savedArticles.indexOf(id);
  if(idx===-1) savedArticles.push(id); else savedArticles.splice(idx,1);
  btn.classList.toggle('saved', savedArticles.includes(id));
  localStorage.setItem('ahm_saved_arts', JSON.stringify(savedArticles));
};

renderInsights();
renderHotList();

// ── ARTICLE READING DRAWER ──────────────────────────────────────────────────
let activeArtId = null;

function openArticleDrawer(id) {
  const art = ARTICLES.find(a => a.id === id);
  if (!art) return;
  activeArtId = id;

  // highlight active card
  document.querySelectorAll('.art-card').forEach(c => c.classList.remove('art-active'));
  const cards = document.querySelectorAll('.art-card');
  cards.forEach(c => { if(c.getAttribute('onclick') && c.getAttribute('onclick').includes(id)) c.classList.add('art-active'); });

  // build content
  const tm = getTopicStyle(art.topics[0]);
  const regionLabel = art.region === 'overseas' ? '🌍 海外' : '🇨🇳 海内';
  const regionStyle = art.region === 'overseas'
    ? 'background:rgba(6,182,212,.2);border:1px solid rgba(6,182,212,.5);color:#22d3ee'
    : 'background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.5);color:#34d399';
  const dateStr = art.publishDate.replace(/-/g, '/');

  const kpHTML = art.keyPoints.map((kp, i) => `
    <li>
      <div class="art-drawer-kp-n">${i+1}</div>
      <span class="art-drawer-kp-t">${kp}</span>
    </li>`).join('');

  document.getElementById('artDrawerScroll').innerHTML = `
    <div class="art-drawer-cover" style="background:${art.coverGradient}"></div>
    <div class="art-drawer-meta">
      <div class="art-drawer-badges">
        <span class="art-drawer-badge" style="${regionStyle}">${regionLabel}</span>
        <span class="art-drawer-badge" style="background:${tm.color};border:1px solid ${tm.border};color:${tm.text}">${tm.label}</span>
        ${art.isFeatured ? '<span class="art-drawer-badge" style="background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff">✨ 精选</span>' : ''}
      </div>
      <div class="art-drawer-title">${art.title}</div>
      <div class="art-drawer-byline">
        ${art.source}${art.author ? ' · ' + art.author : ''}<br>
        ${dateStr} · ⏱ ${art.readTime} 分钟 · ❤ ${art.likes}
      </div>
    </div>
    <div class="art-drawer-hr"></div>
    <div class="art-drawer-section">
      <div class="art-drawer-slabel">核心观点</div>
      <ul class="art-drawer-kp">${kpHTML}</ul>
    </div>
    <div class="art-drawer-hr"></div>
    <div class="art-drawer-section">
      <div class="art-drawer-slabel">文章摘要</div>
      <p class="art-drawer-summary">${art.summary}</p>
    </div>`;

  const hasUrl = art.originalUrl && art.originalUrl !== '#';
  document.getElementById('artDrawerFoot').innerHTML = `
    ${hasUrl
      ? `<a class="art-drawer-cta" href="${art.originalUrl}" target="_blank" rel="noopener">阅读原文 ↗</a>`
      : `<span class="art-drawer-cta" style="opacity:.5;cursor:default">原文链接待更新</span>`}
    <button class="art-drawer-cta-sec" onclick="closeArticleDrawer()">收起</button>`;

  // show drawer, hide hotlist
  document.getElementById('insHotlistWrap').style.display = 'none';
  document.getElementById('insDrawerWrap').style.display = '';
  document.getElementById('artDrawerScroll').scrollTop = 0;
}

function closeArticleDrawer() {
  activeArtId = null;
  document.querySelectorAll('.art-card').forEach(c => c.classList.remove('art-active'));
  document.getElementById('insDrawerWrap').style.display = 'none';
  document.getElementById('insHotlistWrap').style.display = '';
}

window.openArticleDrawer = openArticleDrawer;
window.closeArticleDrawer = closeArticleDrawer;


})();
</script>
</body>
