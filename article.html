<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>文章详情 — AI Horizon Matrix</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060612;--bg2:#0d0d1f;--bg3:#12122a;
  --accent:#6366f1;--accent2:#8b5cf6;--accent3:#06b6d4;
  --gold:#f59e0b;--green:#10b981;--red:#ef4444;
  --text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
  --border:rgba(99,102,241,0.2);--card:rgba(13,13,31,0.8);
  --g1:linear-gradient(135deg,#6366f1,#8b5cf6);
  --g2:linear-gradient(135deg,#06b6d4,#6366f1);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}

/* NAV */
nav{position:fixed;top:0;width:100%;z-index:999;background:rgba(6,6,18,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 40px;height:60px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.nav-logo-box{width:28px;height:28px;background:var(--g1);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.nav-brand-text{font-size:14px;font-weight:700;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-back{display:flex;align-items:center;gap:6px;color:var(--muted2);font-size:13px;text-decoration:none;transition:color .2s;white-space:nowrap}
.nav-back:hover{color:#a5b4fc}
.nav-back-arrow{font-size:16px;line-height:1}
.nav-actions{display:flex;gap:8px;flex-shrink:0}
.nav-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;text-decoration:none}
.nav-btn:hover{border-color:#6366f1;color:#a5b4fc;background:rgba(99,102,241,.1)}
.nav-btn.saved{border-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,.1)}
.nav-btn.copied{border-color:#10b981;color:#10b981}

/* READING PROGRESS BAR */
.progress-bar{position:fixed;top:60px;left:0;width:0%;height:3px;background:var(--g1);z-index:998;transition:width .1s linear}

/* MAIN */
main{max-width:720px;margin:0 auto;padding:100px 24px 80px}

/* COVER */
.art-cover{height:200px;border-radius:16px;overflow:hidden;position:relative;margin-bottom:32px}
.art-cover-bg{width:100%;height:100%}
.art-cover-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,var(--bg))}
.art-cover-badges{position:absolute;bottom:16px;left:20px;display:flex;gap:8px;flex-wrap:wrap}
.badge{padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600}
.badge-overseas{background:rgba(6,182,212,.2);border:1px solid rgba(6,182,212,.5);color:#22d3ee}
.badge-domestic{background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.5);color:#34d399}
.badge-topic{font-size:12px;padding:4px 12px;border-radius:12px;font-weight:600}
.badge-featured{background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:700}

/* META */
.art-meta{margin-bottom:24px}
.art-title{font-size:clamp(1.4rem,3vw,1.9rem);font-weight:800;color:#e0e7ff;line-height:1.35;margin-bottom:10px}
.art-title-orig{font-size:.85rem;color:var(--muted);font-style:italic;margin-bottom:16px;line-height:1.5}
.art-byline{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:.83rem;color:var(--muted)}
.byline-sep{color:var(--border)}
.art-read-time{display:inline-flex;align-items:center;gap:4px;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.25);border-radius:10px;padding:3px 10px;font-size:11px;color:#a5b4fc}

/* DIVIDER */
.art-divider{height:1px;background:var(--border);margin:28px 0}

/* SECTION LABEL */
.section-label{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:#6366f1;font-weight:700}

/* KEY POINTS */
.key-points{list-style:none;display:flex;flex-direction:column;gap:14px;margin-bottom:4px}
.key-points li{display:flex;gap:14px;align-items:flex-start}
.kp-marker{width:24px;height:24px;border-radius:50%;background:rgba(99,102,241,.18);border:1px solid rgba(99,102,241,.4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#a5b4fc;flex-shrink:0;margin-top:1px}
.kp-text{font-size:.95rem;color:var(--text);line-height:1.7}

/* PART 1 — AI 摘要卡 */
.summary-card{background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(139,92,246,.05));border:1px solid rgba(99,102,241,.3);border-radius:16px;padding:24px;margin-bottom:32px}
.summary-card-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.summary-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:.5px;white-space:nowrap}
.summary-desc{font-size:11px;color:var(--muted);font-style:italic}
.summary-kp{margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid rgba(99,102,241,.15)}
.summary-ai-text{font-size:.95rem;color:var(--muted2);line-height:1.9;margin-bottom:20px}
.oneliner-card{background:rgba(99,102,241,.1);border-left:3px solid #6366f1;border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:20px}
.oneliner-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#6366f1;font-weight:700;display:block;margin-bottom:6px}
.oneliner-text{font-size:.95rem;color:#e0e7ff;line-height:1.7;font-weight:500}
.sect-divider{display:flex;align-items:center;gap:16px;margin:28px 0}
.sect-divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(99,102,241,.35),transparent)}
.sect-divider-label{font-size:11px;font-weight:700;color:var(--muted2);letter-spacing:2px;white-space:nowrap;padding:0 4px}
.deepdive-section{margin-bottom:8px}
.deepdive-header{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.deepdive-count{font-size:11px;color:var(--muted);background:rgba(99,102,241,.12);border-radius:8px;padding:2px 8px}

/* 深度解读内容（折叠区） */
.art-fc-section{margin-bottom:28px}
.art-fc-h{font-size:1rem;font-weight:700;color:#c0c0e0;line-height:1.4;margin-bottom:10px;padding-left:12px;border-left:3px solid rgba(99,102,241,.6)}
.art-fc-p{font-size:.95rem;color:#94a3b8;line-height:1.95}

/* ORIG DIVIDER */
.orig-divider{display:flex;align-items:center;gap:16px;margin:32px 0}
.orig-divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(99,102,241,.45),transparent)}
.orig-divider-label{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:2px;white-space:nowrap;padding:0 4px}

/* PART 2 — 原文引导卡 */
.orig-card{border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px;background:var(--card)}
.orig-source-row{display:flex;gap:14px;align-items:stretch;margin-bottom:14px}
.orig-source-bar{width:4px;border-radius:2px;flex-shrink:0;background:var(--g1)}
.orig-source-info{display:flex;flex-direction:column;gap:4px;justify-content:center}
.orig-source-name{font-size:.92rem;font-weight:700;color:#e0e7ff}
.orig-source-meta{font-size:.78rem;color:var(--muted)}
.orig-preview{font-size:.85rem;color:var(--muted2);line-height:1.65;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:18px}
.orig-cta-btn{display:block;width:100%;padding:14px;border-radius:12px;background:var(--g1);color:#fff;font-size:.95rem;font-weight:700;text-align:center;text-decoration:none;border:none;cursor:pointer;transition:opacity .2s,transform .15s;letter-spacing:.3px}
.orig-cta-btn:hover{opacity:.88;transform:translateY(-1px)}
.orig-cta-disabled{background:rgba(99,102,241,.12);color:var(--muted);cursor:not-allowed;pointer-events:none}
.orig-note{text-align:center;font-size:.75rem;color:var(--muted);margin-bottom:32px}

/* RELATED ARTICLES */
.related-section{margin-top:8px}
.related-grid{display:flex;flex-direction:column;gap:12px}
.rel-card{display:flex;gap:14px;align-items:flex-start;padding:14px 16px;border-radius:12px;border:1px solid var(--border);cursor:pointer;text-decoration:none;transition:border-color .2s,background .2s}
.rel-card:hover{border-color:rgba(99,102,241,.5);background:rgba(99,102,241,.05)}
.rel-cover{width:52px;height:52px;border-radius:10px;flex-shrink:0}
.rel-body{flex:1;min-width:0}
.rel-topic{font-size:11px;font-weight:600;margin-bottom:4px}
.rel-title{font-size:.83rem;font-weight:700;color:#e0e7ff;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.rel-meta{font-size:.75rem;color:var(--muted)}

/* FOOTER */
footer{text-align:center;padding:40px 24px 32px;border-top:1px solid var(--border);color:var(--muted);font-size:12px;margin-top:0}
footer .logo-text{font-size:1rem;font-weight:800;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}

/* NOT FOUND */
.not-found{text-align:center;padding:120px 24px 60px;color:var(--muted)}
.not-found h2{font-size:1.4rem;margin-bottom:10px;color:#e0e7ff}
.not-found p{margin-bottom:24px;line-height:1.7}
.not-found a{color:#a5b4fc;text-decoration:none}

@media(max-width:640px){
  nav{padding:0 16px}
  main{padding:80px 16px 60px}
  .art-cover{height:150px}
}

.community-fab{position:fixed;right:24px;bottom:80px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#07c160,#0a9c4c);border:none;color:#fff;font-size:22px;cursor:pointer;z-index:1900;box-shadow:0 4px 16px rgba(7,193,96,.45);transition:transform .2s,box-shadow .2s;display:flex;align-items:center;justify-content:center}
.community-fab:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(7,193,96,.6)}
.community-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:3500;backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .25s}
.community-overlay.active{opacity:1;pointer-events:all}
.community-modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.96);z-index:3501;background:var(--bg2,#1a1a2e);border:1px solid var(--border,rgba(255,255,255,.08));border-radius:20px;padding:32px 28px 28px;width:340px;max-width:92vw;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s}
.community-modal.active{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1)}
.community-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted2,#6b7280);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:8px;transition:color .2s}
.community-close:hover{color:#fff}
.community-header{text-align:center;margin-bottom:20px}
.community-icon{font-size:36px;margin-bottom:8px}
.community-title{font-size:1.1rem;font-weight:700;color:#fff;margin:0 0 6px}
.community-subtitle{font-size:.85rem;color:var(--muted2,#6b7280);margin:0}
.community-qr-wrap{text-align:center;margin-bottom:16px}
.community-qr{width:160px;height:160px;border-radius:12px;background:#fff;padding:6px;object-fit:contain}
.community-qr-tip{font-size:.78rem;color:var(--muted2,#6b7280);margin:8px 0 0}
.community-steps{background:rgba(255,255,255,.04);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;flex-direction:column;gap:8px}
.community-step{font-size:.82rem;color:var(--muted2,#9ca3af)}
.community-stats{display:flex;justify-content:space-around;border-top:1px solid var(--border,rgba(255,255,255,.08));padding-top:16px}
.community-stat{text-align:center}
.community-stat-num{display:block;font-size:.95rem;font-weight:700;color:#a5b4fc}
.community-stat-label{font-size:.72rem;color:var(--muted2,#6b7280)}
@media(max-width:600px){
  .community-modal{left:0;top:auto;bottom:0;transform:translateY(6%);border-radius:20px 20px 0 0;width:100%;max-width:100%;padding:28px 20px 36px}
  .community-modal.active{transform:translateY(0)}
  .community-fab{right:16px;bottom:72px}
}
</style>
</head>
<body>

<!-- READING PROGRESS -->
<div class="progress-bar" id="progressBar"></div>

<!-- NAV -->
<nav>
  <a class="nav-brand" href="index.html">
    <div class="nav-logo-box">🌐</div>
    <span class="nav-brand-text">AI Horizon Matrix</span>
  </a>
  <a class="nav-back" href="insights.html" id="backBtn">
    <span class="nav-back-arrow">←</span>
    <span>行业洞察</span>
  </a>
  <div class="nav-actions">
    <button class="nav-btn" onclick="openCommunityModal()" title="加入社群">💬</button>
    <button class="nav-btn" id="saveBtn" title="收藏" onclick="toggleSave()">🔖</button>
    <button class="nav-btn" id="shareBtn" title="复制链接" onclick="shareArticle()">⬡</button>
    <a class="nav-btn" id="origBtn" title="阅读原文" href="#" target="_blank" rel="noopener">↗</a>
  </div>
</nav>

<!-- MAIN CONTENT -->
<main id="main"></main>

<footer>
  <div class="logo-text">AI Horizon Matrix</div>
  <p>全球AI创业情报平台 · 发现未来独角兽</p>
</footer>

<script src="articles_data.js"></script>
<script>
function getTopicStyle(topic){
  return TOPIC_META[topic] || {label:topic,color:'rgba(99,102,241,.18)',border:'rgba(99,102,241,.5)',text:'#a5b4fc'};
}

function getRelated(art, count){
  return ARTICLES
    .filter(function(a){ return a.id !== art.id && a.topics.some(function(t){ return art.topics.includes(t); }); })
    .sort(function(a,b){ return b.likes - a.likes; })
    .slice(0, count || 3);
}

let savedArticles = JSON.parse(localStorage.getItem('ahm_saved_arts')||'[]');
let currentArt = null;

function renderPage(art){
  currentArt = art;
  document.title = art.title + ' — AI Horizon Matrix';

  // Nav orig button
  var hasUrl = !!art.originalUrl;
  var origBtn = document.getElementById('origBtn');
  if(hasUrl){ origBtn.href = art.originalUrl; origBtn.style.display = 'flex'; }
  else { origBtn.style.display = 'none'; }
  updateSaveBtn();

  // Pre-compute all fragments — no nesting inside the final template literal
  var topicBadges = art.topics.map(function(t){
    var s = getTopicStyle(t);
    return '<span class="badge badge-topic" style="background:'+s.color+';border:1px solid '+s.border+';color:'+s.text+'">'+s.label+'</span>';
  }).join('');

  var regionBadge = art.region === 'overseas'
    ? '<span class="badge badge-overseas">🌍 海外</span>'
    : '<span class="badge badge-domestic">🇨🇳 海内</span>';

  var featuredBadge = art.isFeatured ? '<span class="badge-featured">✨ 精选</span>' : '';

  var titleOrigHtml = art.titleOrig
    ? '<div class="art-title-orig">' + art.titleOrig + '</div>'
    : '';

  var authorHtml = art.author
    ? '<span class="byline-sep">·</span><span>' + art.author + '</span>'
    : '';

  // Key points
  var kpsHtml = art.keyPoints.map(function(kp, i){
    return '<li><div class="kp-marker">'+(i+1)+'</div><span class="kp-text">'+kp+'</span></li>';
  }).join('');

  // One-liner core conclusion card
  var oneLinerHtml = art.oneLiner
    ? '<div class="oneliner-card"><span class="oneliner-label">💡 核心结论</span><p class="oneliner-text">'+art.oneLiner+'</p></div>'
    : '';

  // Deep dive: fullArticle all sections, fully expanded, no collapse
  var deepDiveSectionHtml = '';
  if(art.fullArticle && art.fullArticle.length){
    var sectHtml = art.fullArticle.map(function(s){
      return '<div class="art-fc-section"><div class="art-fc-h">'+s.h+'</div><p class="art-fc-p">'+s.p+'</p></div>';
    }).join('');
    deepDiveSectionHtml = '<div class="sect-divider"><div class="sect-divider-line"></div><div class="sect-divider-label">📖 深度解读</div><div class="sect-divider-line"></div></div>'
      + '<div class="deepdive-section">'
      + '<div class="deepdive-header"><span class="section-label">深度解读</span>'
      + '<span class="deepdive-count">'+art.fullArticle.length+' 个章节</span></div>'
      + sectHtml + '</div>';
  }

  // Part 2: orig card
  var sourceMetaHtml = (art.author ? art.author + ' · ' : '') + art.publishDate;
  var ctaHtml = hasUrl
    ? '<a class="orig-cta-btn" href="'+art.originalUrl+'" target="_blank" rel="noopener">前往原文来源 · '+art.source+' ↗</a>'
    : '<div class="orig-cta-btn orig-cta-disabled">原文链接整理中</div>';
  var noteHtml = hasUrl
    ? art.source+' · 将在新标签页打开'
    : '可关注 '+art.source+' 官方渠道获取原文';
  var origCardHtml = '<div class="orig-card">'
    + '<div class="orig-source-row">'
    +   '<div class="orig-source-bar"></div>'
    +   '<div class="orig-source-info">'
    +     '<div class="orig-source-name">'+art.source+'</div>'
    +     '<div class="orig-source-meta">'+sourceMetaHtml+'</div>'
    +   '</div>'
    + '</div>'
    + '<p class="orig-preview">'+art.summary+'</p>'
    + ctaHtml
    + '</div>'
    + '<p class="orig-note">'+noteHtml+'</p>';

  // Related articles
  var related = getRelated(art);
  var relHtml = related.map(function(r){
    var tm = getTopicStyle(r.topics[0]);
    var rb = r.region === 'overseas'
      ? '<span style="color:#22d3ee;font-size:11px">🌍 海外</span>'
      : '<span style="color:#34d399;font-size:11px">🇨🇳 海内</span>';
    return '<a class="rel-card" href="article.html?id='+r.id+'">'
      + '<div class="rel-cover" style="background:'+r.coverGradient+'"></div>'
      + '<div class="rel-body">'
      +   '<div class="rel-topic" style="color:'+tm.text+'">'+tm.label+'</div>'
      +   '<div class="rel-title">'+r.title+'</div>'
      +   '<div class="rel-meta">'+rb+' · '+r.source+' · '+r.readTime+'min · ❤ '+r.likes+'</div>'
      + '</div></a>';
  }).join('');
  var relatedHtml = related.length > 0
    ? '<div class="related-section"><div class="section-label" style="margin-bottom:16px">相关文章</div><div class="related-grid">'+relHtml+'</div></div>'
    : '';

  // Single-level template literal — all variables pre-computed above
  document.getElementById('main').innerHTML = `
    <div class="art-cover">
      <div class="art-cover-bg" style="background:${art.coverGradient}"></div>
      <div class="art-cover-overlay"></div>
      <div class="art-cover-badges">${regionBadge}${topicBadges}${featuredBadge}</div>
    </div>
    <div class="art-meta">
      <h1 class="art-title">${art.title}</h1>
      ${titleOrigHtml}
      <div class="art-byline">
        <span>${art.source}</span>
        ${authorHtml}
        <span class="byline-sep">·</span><span>${art.publishDate}</span>
        <span class="byline-sep">·</span><span class="art-read-time">⏱ 预计阅读 ${art.readTime} 分钟</span>
        <span class="byline-sep">·</span><span>❤ ${art.likes} 人收藏</span>
      </div>
    </div>
    <div class="art-divider"></div>
    <div class="summary-card">
      <div class="summary-card-header">
        <span class="summary-badge">⚡ AI 提炼</span>
        <span class="summary-desc">快速掌握核心观点</span>
      </div>
      ${oneLinerHtml}
      <div class="summary-kp">
        <div class="section-label" style="margin-bottom:12px">核心观点</div>
        <ul class="key-points">${kpsHtml}</ul>
      </div>
      <p class="summary-ai-text">${art.summary}</p>
    </div>
    ${deepDiveSectionHtml}
    <div class="orig-divider">
      <div class="orig-divider-line"></div>
      <div class="orig-divider-label">📖 阅读原文</div>
      <div class="orig-divider-line"></div>
    </div>
    ${origCardHtml}
    ${relatedHtml}
  `;
}

function renderNotFound(id){
  document.getElementById('main').innerHTML = `
    <div class="not-found">
      <h2>文章未找到</h2>
      <p>ID 为 "${id || '未知'}" 的文章不存在，<br>可能已被移除或链接有误。</p>
      <a href="insights.html">← 返回行业洞察</a>
    </div>`;
}

function updateSaveBtn(){
  const btn = document.getElementById('saveBtn');
  if(!btn || !currentArt) return;
  if(savedArticles.includes(currentArt.id)){
    btn.classList.add('saved');
    btn.title = '取消收藏';
  } else {
    btn.classList.remove('saved');
    btn.title = '收藏';
  }
}

window.toggleSave = function(){
  if(!currentArt) return;
  const idx = savedArticles.indexOf(currentArt.id);
  if(idx === -1) savedArticles.push(currentArt.id);
  else savedArticles.splice(idx, 1);
  localStorage.setItem('ahm_saved_arts', JSON.stringify(savedArticles));
  updateSaveBtn();
};


window.shareArticle = function(){
  const btn = document.getElementById('shareBtn');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(location.href).then(function(){
      btn.textContent = '✓';
      btn.classList.add('copied');
      setTimeout(function(){ btn.textContent = '⬡'; btn.classList.remove('copied'); }, 1800);
    }).catch(function(){
      prompt('复制链接：', location.href);
    });
  } else {
    prompt('复制链接：', location.href);
  }
};

document.getElementById('backBtn').addEventListener('click', function(e){
  e.preventDefault();
  if(document.referrer && document.referrer.includes(location.hostname)){
    history.back();
  } else {
    location.href = 'insights.html';
  }
});

window.addEventListener('scroll', function(){
  const doc = document.documentElement;
  const scrollTop = doc.scrollTop || document.body.scrollTop;
  const scrollHeight = doc.scrollHeight - doc.clientHeight;
  const pct = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
  document.getElementById('progressBar').style.width = pct + '%';
});

// Init
const params = new URLSearchParams(location.search);
const id = params.get('id');
const art = ARTICLES.find(function(a){ return a.id === id; });
if(art) renderPage(art);
else renderNotFound(id);
</script>
