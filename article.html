<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060612;--bg2:#0d0d1f;--bg3:#12122a;
  --accent:#6366f1;--accent2:#8b5cf6;--accent3:#06b6d4;
  --gold:#f59e0b;--green:#10b981;--red:#ef4444;
  --text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
  --border:rgba(99,102,241,0.2);--card:rgba(13,13,31,0.8);
  --g1:linear-gradient(135deg,#6366f1,#8b5cf6);
  --g2:linear-gradient(135deg,#06b6d4,#6366f1);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}

/* NAV */
nav{position:fixed;top:0;width:100%;z-index:999;background:rgba(6,6,18,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 40px;height:60px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.nav-logo-box{width:28px;height:28px;background:var(--g1);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.nav-brand-text{font-size:14px;font-weight:700;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-back{display:flex;align-items:center;gap:6px;color:var(--muted2);font-size:13px;text-decoration:none;transition:color .2s;white-space:nowrap}
.nav-back:hover{color:#a5b4fc}
.nav-back-arrow{font-size:16px;line-height:1}
.nav-actions{display:flex;gap:8px;flex-shrink:0}
.nav-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;text-decoration:none}
.nav-btn:hover{border-color:#6366f1;color:#a5b4fc;background:rgba(99,102,241,.1)}
.nav-btn.saved{border-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,.1)}
.nav-btn.copied{border-color:#10b981;color:#10b981}

/* READING PROGRESS BAR */
.progress-bar{position:fixed;top:60px;left:0;width:0%;height:3px;background:var(--g1);z-index:998;transition:width .1s linear}

/* MAIN */
main{max-width:720px;margin:0 auto;padding:100px 24px 80px}

/* COVER */
.art-cover{height:200px;border-radius:16px;overflow:hidden;position:relative;margin-bottom:32px}
.art-cover-bg{width:100%;height:100%}
.art-cover-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,var(--bg))}
.art-cover-badges{position:absolute;bottom:16px;left:20px;display:flex;gap:8px}
.badge{padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600}
.badge-overseas{background:rgba(6,182,212,.2);border:1px solid rgba(6,182,212,.5);color:#22d3ee}
.badge-domestic{background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.5);color:#34d399}
.badge-topic{font-size:12px;padding:4px 12px;border-radius:12px;font-weight:600}
.badge-featured{background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:700}

/* META */
.art-meta{margin-bottom:24px}
.art-title{font-size:clamp(1.4rem,3vw,1.9rem);font-weight:800;color:#e0e7ff;line-height:1.35;margin-bottom:10px}
.art-title-orig{font-size:.85rem;color:var(--muted);font-style:italic;margin-bottom:16px;line-height:1.5}
.art-byline{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:.83rem;color:var(--muted)}
.byline-sep{color:var(--border)}
.art-read-time{display:inline-flex;align-items:center;gap:4px;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.25);border-radius:10px;padding:3px 10px;font-size:11px;color:#a5b4fc}

/* DIVIDER */
.art-divider{height:1px;background:var(--border);margin:28px 0}

/* KEY POINTS */
.section-label{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:#6366f1;font-weight:700;margin-bottom:16px}
.key-points{list-style:none;display:flex;flex-direction:column;gap:14px;margin-bottom:4px}
.key-points li{display:flex;gap:14px;align-items:flex-start}
.kp-marker{width:24px;height:24px;border-radius:50%;background:rgba(99,102,241,.18);border:1px solid rgba(99,102,241,.4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#a5b4fc;flex-shrink:0;margin-top:1px}
.kp-text{font-size:.95rem;color:var(--text);line-height:1.7}

/* SUMMARY */
.art-summary-text{font-size:.98rem;color:var(--muted2);line-height:1.9}

/* ORIG CTA */
.orig-cta{display:block;width:100%;padding:14px;border-radius:14px;background:var(--g1);color:#fff;font-size:.95rem;font-weight:700;text-align:center;text-decoration:none;border:none;cursor:pointer;transition:opacity .2s,transform .2s;letter-spacing:.3px}
.orig-cta:hover{opacity:.88;transform:translateY(-1px)}
.orig-cta-note{text-align:center;font-size:.75rem;color:var(--muted);margin-top:8px}

/* RELATED ARTICLES */
.related-grid{display:flex;flex-direction:column;gap:12px}
.rel-card{display:flex;gap:14px;align-items:flex-start;padding:14px 16px;border-radius:12px;border:1px solid var(--border);cursor:pointer;text-decoration:none;transition:border-color .2s,background .2s}
.rel-card:hover{border-color:rgba(99,102,241,.5);background:rgba(99,102,241,.05)}
.rel-cover{width:52px;height:52px;border-radius:10px;flex-shrink:0}
.rel-body{flex:1;min-width:0}
.rel-topic{font-size:11px;font-weight:600;margin-bottom:4px}
.rel-title{font-size:.83rem;font-weight:700;color:#e0e7ff;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.rel-meta{font-size:.75rem;color:var(--muted)}

/* FOOTER */
footer{text-align:center;padding:40px 24px 32px;border-top:1px solid var(--border);color:var(--muted);font-size:12px;margin-top:0}
footer .logo-text{font-size:1rem;font-weight:800;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}

/* NOT FOUND */
.not-found{text-align:center;padding:120px 24px 60px;color:var(--muted)}
.not-found h2{font-size:1.4rem;margin-bottom:10px;color:#e0e7ff}
.not-found p{margin-bottom:24px;line-height:1.7}
.not-found a{color:#a5b4fc;text-decoration:none}

@media(max-width:640px){
  nav{padding:0 16px}
  main{padding:80px 16px 60px}
  .art-cover{height:150px}
}
</style>

function getTopicStyle(topic){
  return TOPIC_META[topic] || {label:topic,color:'rgba(99,102,241,.18)',border:'rgba(99,102,241,.5)',text:'#a5b4fc'};
}

function getRelated(art, count){
  return ARTICLES
    .filter(a => a.id !== art.id && a.topics.some(t => art.topics.includes(t)))
    .sort((a,b) => b.likes - a.likes)
    .slice(0, count || 3);
}

let savedArticles = JSON.parse(localStorage.getItem('ahm_saved_arts')||'[]');
let currentArt = null;

function renderPage(art){
  currentArt = art;
  document.title = art.title + ' — AI Horizon Matrix';

  // Update nav orig link
  const origBtn = document.getElementById('origBtn');
  if(art.originalUrl && art.originalUrl !== '#'){
    origBtn.href = art.originalUrl;
    origBtn.style.display = '';
  } else {
    origBtn.style.display = 'none';
  }

  // Save btn state
  updateSaveBtn();

  // Topic badges
  const topicBadges = art.topics.map(t => {
    const s = getTopicStyle(t);
    return `<span class="badge badge-topic" style="background:${s.color};border:1px solid ${s.border};color:${s.text}">${s.label}</span>`;
  }).join('');

  const regionBadge = art.region === 'overseas'
    ? '<span class="badge badge-overseas">🌍 海外</span>'
    : '<span class="badge badge-domestic">🇨🇳 海内</span>';

  const featuredBadge = art.isFeatured ? '<span class="badge-featured">✨ 精选</span>' : '';

  // Key points
  const kps = art.keyPoints.map((kp, i) => `
    <li>
      <div class="kp-marker">${i+1}</div>
      <span class="kp-text">${kp}</span>
    </li>`).join('');

  // Related articles
  const related = getRelated(art);
  const relHTML = related.map(r => {
    const tm = getTopicStyle(r.topics[0]);
    const regionBadgeSmall = r.region==='overseas'
      ? '<span style="color:#22d3ee;font-size:11px">🌍 海外</span>'
      : '<span style="color:#34d399;font-size:11px">🇨🇳 海内</span>';
    return `
      <a class="rel-card" href="article.html?id=${r.id}">
        <div class="rel-cover" style="background:${r.coverGradient}"></div>
        <div class="rel-body">
          <div class="rel-topic" style="color:${tm.text}">${tm.label}</div>
          <div class="rel-title">${r.title}</div>
          <div class="rel-meta">${regionBadgeSmall} · ${r.source} · ${r.readTime}min · ❤ ${r.likes}</div>
        </div>
      </a>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="art-cover">
      <div class="art-cover-bg" style="background:${art.coverGradient}"></div>
      <div class="art-cover-overlay"></div>
      <div class="art-cover-badges">
        ${regionBadge}
        ${topicBadges}
        ${featuredBadge}
      </div>
    </div>

    <div class="art-meta">
      <h1 class="art-title">${art.title}</h1>
      ${art.titleOrig ? `<div class="art-title-orig">${art.titleOrig}</div>` : ''}
      <div class="art-byline">
        <span>${art.source}</span>
        ${art.author ? `<span class="byline-sep">·</span><span>${art.author}</span>` : ''}
        <span class="byline-sep">·</span><span>${art.publishDate}</span>
        <span class="byline-sep">·</span>
        <span class="art-read-time">⏱ 预计阅读 ${art.readTime} 分钟</span>
        <span class="byline-sep">·</span><span>❤ ${art.likes} 人收藏</span>
      </div>
    </div>

    <div class="art-divider"></div>

    <div style="margin-bottom:32px">
      <div class="section-label">核心观点</div>
      <ul class="key-points">${kps}</ul>
    </div>

    <div class="art-divider"></div>

    <div style="margin-bottom:36px">
      <div class="section-label">文章摘要</div>
      <p class="art-summary-text">${art.summary}</p>
    </div>

    ${art.originalUrl && art.originalUrl !== '#' ? `
    <div style="margin-bottom:40px">
      <a class="orig-cta" href="${art.originalUrl}" target="_blank" rel="noopener">阅读原文 ↗</a>
      <p class="orig-cta-note">将跳转至 ${art.source} 原文页面</p>
    </div>` : `
    <div style="margin-bottom:40px">
      <div style="padding:16px 20px;border-radius:12px;border:1px dashed var(--border);text-align:center;color:var(--muted);font-size:.85rem">
        原文链接待更新 · 请关注 ${art.source} 官方渠道
      </div>
    </div>`}

    <div class="art-divider"></div>

    ${related.length > 0 ? `
    <div>
      <div class="section-label" style="margin-bottom:16px">相关文章</div>
      <div class="related-grid">${relHTML}</div>
    </div>` : ''}
  `;
}

function renderNotFound(id){
  document.getElementById('main').innerHTML = `
    <div class="not-found">
      <h2>文章未找到</h2>
      <p>ID 为 "${id || '未知'}" 的文章不存在，<br>可能已被移除或链接有误。</p>
      <a href="index.html#insights">← 返回行业洞察</a>
    </div>`;
}

function updateSaveBtn(){
  const btn = document.getElementById('saveBtn');
  if(!btn || !currentArt) return;
  if(savedArticles.includes(currentArt.id)){
    btn.classList.add('saved');
    btn.title = '取消收藏';
  } else {
    btn.classList.remove('saved');
    btn.title = '收藏';
  }
}

window.toggleSave = function(){
  if(!currentArt) return;
  const idx = savedArticles.indexOf(currentArt.id);
  if(idx === -1) savedArticles.push(currentArt.id);
  else savedArticles.splice(idx, 1);
  localStorage.setItem('ahm_saved_arts', JSON.stringify(savedArticles));
  updateSaveBtn();
};

window.shareArticle = function(){
  const btn = document.getElementById('shareBtn');
  navigator.clipboard.writeText(location.href).then(()=>{
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent = '⬡'; btn.classList.remove('copied'); }, 1800);
  }).catch(()=>{
    prompt('复制链接：', location.href);
  });
};

// Back button: use history if available, else go to index#insights
document.getElementById('backBtn').addEventListener('click', e => {
  e.preventDefault();
  if(document.referrer && document.referrer.includes(location.hostname)){
    history.back();
  } else {
    location.href = 'insights.html';
  }
});

// Reading progress bar
window.addEventListener('scroll', () => {
  const doc = document.documentElement;
  const scrollTop = doc.scrollTop || document.body.scrollTop;
  const scrollHeight = doc.scrollHeight - doc.clientHeight;
  const pct = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
  document.getElementById('progressBar').style.width = pct + '%';
});

// Init
const params = new URLSearchParams(location.search);
const id = params.get('id');
const art = ARTICLES.find(a => a.id === id);
if(art) renderPage(art);
else renderNotFound(id);
</script>
